{% extends "base.html" %}
{% block title %}Import Lab Report - Hermes Health{% endblock %}
{% block content %}
<div>
  <div class="card" style="margin-bottom: 12px;">
    <div class="card-title">Upload lab report</div>
    <form id="upload-form"
          hx-post="/api/v1/reports/upload"
          hx-target="#import-progress"
          hx-swap="innerHTML"
          hx-encoding="multipart/form-data">
      <div class="form-group">
        <label for="file">Select PDF or CSV file</label>
        <input type="file" name="file" id="file-input" accept=".pdf,.csv" required
               style="font-size: 14px; padding: 8px 0;">
      </div>
      <button type="submit" class="btn-primary" style="max-width: 200px;">Upload & Extract</button>
    </form>
  </div>

  <div id="import-progress"></div>

  <div class="card">
    <div class="card-title">Imports</div>
    {% if imports %}
    <div id="imports-list"
         hx-get="/imports/list"
         hx-trigger="every 5s"
         hx-swap="innerHTML">
      {% include "components/imports_list.html" %}
    </div>
    {% else %}
    <div id="imports-list"
         hx-get="/imports/list"
         hx-trigger="every 5s"
         hx-swap="innerHTML">
      <div style="font-size: 13px; color: var(--text-secondary); padding: 8px 0;">No imports yet. Upload a lab report to get started.</div>
    </div>
    {% endif %}
  </div>
</div>
{% endblock %}
