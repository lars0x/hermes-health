{% extends "base.html" %}
{% block title %}Add Data - Hermes Health{% endblock %}
{% block content %}
<div style="max-width: 800px;">

  <!-- Tabs -->
  <div class="tab-bar">
    <button class="tab-btn" onclick="switchTab('import', this)">Import Report</button>
    <button class="tab-btn" onclick="switchTab('manual', this)">Manual Entry</button>
  </div>

  <!-- Manual entry tab -->
  <div id="tab-manual" style="display: none;">
    <div class="card" style="max-width: 480px;">
      <div class="card-title">Add observation</div>
      <div id="form-result"></div>
      <form hx-post="/observations/create"
            hx-target="#form-result"
            hx-swap="innerHTML">

        <div class="form-group autocomplete-wrapper">
          <label for="biomarker">Biomarker</label>
          <input type="hidden" id="biomarker-code" name="biomarker" value="">
          <input type="text" id="biomarker-search" name="q" placeholder="Search by name or LOINC code..."
                 hx-get="/api/v1/biomarkers/search"
                 hx-trigger="keyup changed delay:300ms"
                 hx-target="#autocomplete-results"
                 hx-swap="innerHTML"
                 hx-include="[name='q']"
                 autocomplete="off">
          <div id="autocomplete-results"></div>
        </div>

        <div class="form-row">
          <div class="form-group">
            <label for="value">Value</label>
            <input type="number" name="value" id="obs-value" step="any" required>
          </div>
          <div class="form-group">
            <label for="unit">Unit</label>
            <input type="text" name="unit" id="obs-unit" placeholder="mg/dL" required>
          </div>
        </div>

        <div class="form-group">
          <label for="date">Date</label>
          <input type="date" name="date" value="{{ today }}" required>
        </div>

        <div class="form-row">
          <div class="form-group">
            <label for="lab">Lab</label>
            <input type="text" name="lab" placeholder="e.g. Parkway">
          </div>
          <div class="form-group">
            <label>Fasting</label>
            <div class="pill-group">
              <label class="pill-btn" onclick="this.querySelector('input').checked=true; updatePills(this)">
                <input type="radio" name="fasting" value="yes" style="display:none"> Yes
              </label>
              <label class="pill-btn" onclick="this.querySelector('input').checked=true; updatePills(this)">
                <input type="radio" name="fasting" value="no" style="display:none"> No
              </label>
            </div>
          </div>
        </div>

        <div class="form-group">
          <label for="notes">Notes</label>
          <textarea name="notes" placeholder="Optional notes..."></textarea>
        </div>

        <button type="submit" class="btn-primary">Add observation</button>
      </form>
    </div>
  </div>

  <!-- Import tab -->
  <div id="tab-import">
    <div class="card" style="margin-bottom: 12px;">
      <div class="card-title">Upload lab reports</div>
      <div class="form-group">
        <label>Select PDF or CSV files</label>
        <input type="file" id="file-picker" accept=".pdf,.csv"
               style="font-size: 14px; padding: 8px 0;"
               onchange="addFile(this)">
      </div>
      <div id="file-list" style="margin-bottom: 12px;"></div>
      <button id="upload-btn" class="btn-primary" style="max-width: 200px; display: none;" onclick="uploadAll()">Upload & Extract</button>
    </div>

    <div id="import-progress"></div>

    <div class="card">
      <div class="card-title">Imports</div>
      <div id="imports-list"
           hx-get="/imports/list"
           hx-trigger="every 5s, imports-updated from:body"
           hx-swap="innerHTML">
        {% include "components/imports_list.html" %}
      </div>
    </div>
  </div>

</div>

<script>
function switchTab(tab, btn) {
  document.getElementById('tab-manual').style.display = tab === 'manual' ? '' : 'none';
  document.getElementById('tab-import').style.display = tab === 'import' ? '' : 'none';
  document.querySelectorAll('.tab-btn').forEach(function(b) { b.classList.remove('active'); });
  btn.classList.add('active');
  history.replaceState(null, '', '/entry#' + tab);
}
(function() {
  var hash = window.location.hash.replace('#', '');
  if (hash === 'manual') {
    var btn = document.querySelectorAll('.tab-btn')[1];
    switchTab('manual', btn);
  } else {
    // Default: import tab active
    var btn = document.querySelectorAll('.tab-btn')[0];
    btn.classList.add('active');
  }
})();

// --- Multi-file upload ---
var pendingFiles = [];

function addFile(input) {
  if (!input.files.length) return;
  var file = input.files[0];
  // Prevent duplicates by name+size
  if (pendingFiles.some(function(f) { return f.name === file.name && f.size === file.size; })) {
    input.value = '';
    return;
  }
  pendingFiles.push(file);
  input.value = '';
  renderFileList();
}

function removeFile(idx) {
  pendingFiles.splice(idx, 1);
  renderFileList();
}

function renderFileList() {
  var el = document.getElementById('file-list');
  var btn = document.getElementById('upload-btn');
  if (!pendingFiles.length) {
    el.innerHTML = '';
    btn.style.display = 'none';
    return;
  }
  btn.style.display = '';
  var html = '';
  for (var i = 0; i < pendingFiles.length; i++) {
    var f = pendingFiles[i];
    var ext = f.name.split('.').pop().toUpperCase();
    var size = f.size > 1024*1024 ? (f.size/1024/1024).toFixed(1) + ' MB' : (f.size/1024).toFixed(0) + ' KB';
    html += '<div style="display:flex; align-items:center; gap:8px; padding:6px 0; border-bottom:0.5px solid var(--border);">';
    html += '<span class="pill pill-other" style="font-size:10px;">' + ext + '</span>';
    html += '<span style="font-size:13px; flex:1;">' + f.name + '</span>';
    html += '<span style="font-size:11px; color:var(--text-secondary);">' + size + '</span>';
    html += '<span style="cursor:pointer; color:var(--red); font-size:14px; padding:0 4px;" onclick="removeFile(' + i + ')">&times;</span>';
    html += '</div>';
  }
  el.innerHTML = html;
}

function uploadAll() {
  if (!pendingFiles.length) return;
  var btn = document.getElementById('upload-btn');
  btn.disabled = true;
  btn.textContent = 'Uploading...';
  var progress = document.getElementById('import-progress');
  progress.innerHTML = '<div class="alert" style="background:var(--info-bg);color:var(--info-text);">Uploading ' + pendingFiles.length + ' file(s)...</div>';

  var files = pendingFiles.slice();
  pendingFiles = [];
  renderFileList();

  var uploaded = 0;
  var total = files.length;

  function uploadNext() {
    if (uploaded >= total) {
      btn.disabled = false;
      btn.textContent = 'Upload & Extract';
      htmx.trigger(document.body, 'imports-updated');
      return;
    }
    var formData = new FormData();
    formData.append('file', files[uploaded]);
    fetch('/api/v1/reports/upload', { method: 'POST', body: formData })
      .then(function(resp) { return resp.text(); })
      .then(function(html) {
        uploaded++;
        progress.innerHTML = html;
        if (uploaded < total) {
          progress.innerHTML += '<div style="font-size:12px;color:var(--text-secondary);margin-top:4px;">Uploaded ' + uploaded + '/' + total + ' files...</div>';
        }
        htmx.trigger(document.body, 'imports-updated');
        htmx.process(progress);
        uploadNext();
      })
      .catch(function(err) {
        uploaded++;
        progress.innerHTML += '<div class="alert alert-error">Failed to upload: ' + files[uploaded-1].name + '</div>';
        uploadNext();
      });
  }
  uploadNext();
}
</script>
{% endblock %}
